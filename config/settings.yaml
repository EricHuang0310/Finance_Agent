# Multi-Agent Trading System Configuration

# Trading strategy: momentum (trend-following, short-to-medium term)
strategy: momentum

# Watchlist mode: "static" uses the list below, "dynamic" uses the screener agent
watchlist_mode: dynamic    # static | dynamic

# Static watchlist - used when watchlist_mode is "static"
watchlist:
  stocks:
    - AAPL
    - MSFT
    - NVDA
    - GOOGL
    - AMZN
    - META
    - TSLA
    - TSM
    - JPM
    - V
    - BAC
    - C
    - WFC
    - JNJ
    - CVX
    - XOM
    - MCD
    - VZ
    - DIS
    - CMCSA
    - MMM
    - MU
    - COST
    - ONDS
    - SNDK
    - CRWV
    - NFLX
    - WMT
    - MSTR
    - COIN
    - AMD
    - MRVL
    - AVGO
    - PLTR
    - LITE

# Symbol Screener settings - used when watchlist_mode is "dynamic"
screener:
  max_stocks: 20              # Max stock symbols to select
  min_price: 5.0              # Minimum stock price ($)
  max_price: 1000.0           # Maximum stock price ($)
  min_avg_volume: 500000      # Minimum 20-day average volume
  lookback_days: 20           # Days of data for screening metrics
  discovery_enabled: true      # Enable dynamic market-wide discovery via Alpaca Screener API
  discovery_top: 20            # How many symbols to request from each screener endpoint

# Scoring weights for signal aggregation
scoring:
  technical_analyst: 0.35
  market_analyst: 0.20
  sentiment_analyst: 0.15
  risk_manager: 0.30

# Decision engine settings
decision:
  min_score_to_buy: 0.3
  min_score_to_sell: 0.3
  require_human_confirm: false

# Market regime detection settings
regime:
  vix_force_risk_off: 35        # VIX threshold to force risk_off regime
  cross_asset_symbols: [TLT, UUP]  # Cross-asset trend confirmation (VIX via yfinance ^VIX)

# Risk management constraints
risk:
  max_position_pct: 10        # Max single position as % of portfolio
  max_exposure_pct: 80        # Max total exposure as % of portfolio
  max_positions: 100           # Max simultaneous positions
  daily_loss_limit_pct: 2     # Daily loss limit %
  kill_switch_pct: 3          # Kill switch trigger %
  max_drawdown_pct: 10        # Max drawdown from peak %
  min_risk_reward: 1.5        # Minimum risk-reward ratio
  max_sector_pct: 30          # Max single sector as % of portfolio
  max_same_sector_same_direction: 3  # Max positions in same sector & direction

# Position exit review settings
position_exit:
  exit_threshold: 0.5         # Min exit_score to trigger close (0.0 - 1.0)
  atr_multiplier: 2.0         # Trailing stop = recent_high - multiplier * ATR
  trailing_lookback_bars: 10   # Bars to look back for recent high/low
  # --- Hard stop rules (professional desk practices) ---
  breakeven_atr_trigger: 1.0       # After gaining >= 1 ATR, move stop to entry; exit if retraces to entry
  profit_lock_atr_trigger: 2.0     # After gaining >= 2 ATR, start trailing profit lock
  profit_lock_trail_atr: 1.5       # Trail stop at high_water_mark - 1.5 * ATR
  giveback_threshold: 0.50         # Exit if given back >= 50% of peak unrealized PnL
  giveback_min_peak_pct: 0.03      # Only apply give-back rule if peak PnL was >= 3%
  time_stop_days: 5                # Days of no favorable move to increase exit pressure
  time_stop_flat_atr: 0.5          # "No favorable move" = less than 0.5 ATR gain in N days
  # --- ATR Gradient Trailing Stop tiers ---
  atr_gradient:
    - { trigger: 2.0,  lock: 0.75 }
    - { trigger: 3.0,  lock: 1.5 }
    - { trigger: 5.0,  lock: 3.0 }
    - { trigger: 10.0, lock: 7.0 }
    - { trigger: 15.0, lock: 12.0 }
  # --- Partial close settings ---
  partial_close_enabled: true
  partial_close_high_vol_atr: 2.0    # High-vol stocks: partial at 2 ATR
  partial_close_high_vol_pct: 0.50   # Close 50%
  partial_close_standard_atr: 4.0    # Standard: partial at 4 ATR
  partial_close_standard_pct: 0.25   # Close 25%
  partial_close_bank_atr: 2.0        # Banks: partial at 2 ATR
  partial_close_bank_pct: 0.50       # Close 50%

# Entry quality filters (applied in Risk Manager)
entry_filters:
  min_adx: 15                    # Reject momentum trades if ADX < 15
  near_90d_high_pct: 0.02       # Within 2% of 90d high -> reduce qty 50% for buys
  near_90d_low_pct: 0.02        # Within 2% of 90d low -> reduce qty 50% for shorts

# Debate settings (Agent Teams mode only — skipped in standalone mode)
debate:
  top_n: 3                    # Top-N candidates enter investment debate
  investment_rounds: 1        # Bull/Bear debate rounds per candidate

# Memory settings (BM25-based learning system)
memory:
  storage_dir: memory_store   # Directory for memory JSON files
  max_memories: 500           # Max entries per memory bank before pruning

# ══════════════════════════════════════════════
# Strategic Oversight Configuration
# ══════════════════════════════════════════════

cio:
  # Stance triggers (quantitative thresholds)
  vix_defensive_threshold: 30      # VIX above this = consider defensive
  vix_aggressive_threshold: 18     # VIX below this = consider aggressive
  # Risk budget multipliers per stance
  aggressive_multiplier: 1.3
  neutral_multiplier: 1.0
  defensive_multiplier: 0.6
  # Halt trading conditions
  halt_on_vix_above: 40            # Emergency halt threshold

macro:
  # Cross-asset tickers
  vix_ticker: "^VIX"
  tlt_ticker: "TLT"
  uup_ticker: "UUP"
  yield_10y_ticker: "^TNX"
  yield_3m_ticker: "^IRX"
  # Data lookback
  trend_lookback_days: 20
  sma_short: 5
  sma_long: 20

eod_review:
  # Confidence decay for historical EOD insights
  decay_weights:
    1: 1.0    # yesterday
    2: 0.5    # 2 days ago
    3: 0.25   # 3 days ago
  max_lookback_days: 3
  # Thesis drift detection
  drift_rsi_threshold: 15          # RSI change from entry exceeding this flags drift
  drift_price_reversal_pct: 5      # Price reversal from entry exceeding this flags drift

# Model tier assignments (TEAMS-03)
model_tiers:
  # Strategic (CIO is Lead agent, uses default model)
  macro-strategist: sonnet
  eod-review: sonnet
  # Analysts
  symbol-screener: haiku
  market-analyst: haiku
  technical-analyst: haiku
  sentiment-analyst: haiku
  fundamentals-analyst: haiku
  # Debate
  bull-researcher: sonnet
  bear-researcher: sonnet
  research-judge: opus
  # Risk + Execution
  risk-manager: haiku
  executor: haiku
  position-reviewer: haiku
  # Post-trade
  reporter: haiku
  reflection-analyst: opus

